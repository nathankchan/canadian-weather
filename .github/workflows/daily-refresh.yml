name: Daily Data Refresh & Deploy

on:
  schedule:
    # Runs at 06:00 UTC daily (after ECCC typically updates overnight)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RENV_PATHS_CACHE: ~/.cache/renv
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.SHINYAPPS_TOKEN }}" || -z "${{ secrets.SHINYAPPS_SECRET }}" ]]; then
            echo "::error::Missing SHINYAPPS_TOKEN or SHINYAPPS_SECRET repository secrets"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache renv library
        uses: actions/cache@v5
        with:
          path: ~/.cache/renv
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv packages
        run: |
          install.packages("renv")
          renv::restore()
        shell: Rscript {0}

      - name: Cache raw CSV data
        uses: actions/cache@v5
        with:
          path: rawdata
          key: rawdata-${{ hashFiles('stationlist.csv') }}
          restore-keys: rawdata-

      - name: Checksum before pipeline
        run: find data -name '*.parquet' -exec md5sum {} + | sort > /tmp/before.md5 || true

      - name: Run data pipeline
        run: Rscript pipeline.R

      - name: Check for data changes
        id: diff
        run: |
          find data -name '*.parquet' -exec md5sum {} + | sort > /tmp/after.md5
          if diff -q /tmp/before.md5 /tmp/after.md5 > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected — skipping deploy"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected — will deploy"
          fi

      - name: Deploy to shinyapps.io
        if: steps.diff.outputs.changed == 'true'
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir    = ".",
            appName   = "canadian-weather",
            appTitle  = "canadian-weather",
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
