name: Daily Data Refresh & Deploy

on:
  schedule:
    # Runs at 06:00 UTC daily (after ECCC typically updates overnight)
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      RENV_PATHS_CACHE: ~/.cache/renv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cache renv library
        uses: actions/cache@v4
        with:
          path: ~/.cache/renv
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv packages
        run: |
          install.packages("renv")
          renv::restore()
        shell: Rscript {0}

      - name: Run data pipeline
        run: Rscript pipeline.R

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appDir    = ".",
            appName   = "canadian-weather",
            appTitle  = "canadian-weather",
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        shell: Rscript {0}
